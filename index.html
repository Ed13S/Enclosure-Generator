<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Enclosure Generator</title>
<style>
body{font-family:system-ui,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;background:#111;color:#eee}
textarea,input{width:100%;box-sizing:border-box;padding:8px;margin:6px 0;background:#1c1c1c;color:#eee;border:1px solid #444;border-radius:6px}
textarea{height:120px}
button{padding:10px 18px;background:#4f8cff;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-right:8px}
button.secondary{background:#333}
button:disabled{opacity:.5}
pre{background:#1c1c1c;padding:12px;border-radius:6px;overflow:auto;max-height:400px;white-space:pre-wrap}
a.btn{display:inline-block;margin-right:10px;color:#4f8cff}
.row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
</style>
</head>
<body>
<h2>AI Enclosure Generator</h2>
<p>Describe a project, or import a MAKESPEC (or similar) project JSON to auto-fill the description. Runs entirely in your browser — your OpenRouter key goes straight to OpenRouter.</p>

<label>OpenRouter API Key</label>
<input id="apiKey" type="password" placeholder="sk-or-...">

<label>Model (optional, default anthropic/claude-sonnet-4.5)</label>
<input id="model" placeholder="e.g. openai/gpt-4o, google/gemini-2.5-pro">

<div class="row">
  <button class="secondary" id="importBtn">Import project JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div>

<label>Project description</label>
<textarea id="description" placeholder="ESP32 dev board, 51x28mm, USB-C cutout, power switch, 4x M2.5 mounts 43mm apart..."></textarea>

<div class="row">
  <button id="genBtn">Generate Enclosure</button>
  <button class="secondary" id="exportBtn" disabled>Export project JSON</button>
</div>
<p id="status"></p>

<div id="result" style="display:none">
  <div id="links"></div>
  <pre id="code"></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const SYSTEM_PROMPT = `You are an expert mechanical/CAD engineer who writes OpenSCAD code for electronics enclosures.
Given a description of a project/board (dimensions, ports, mounting needs, etc.), output a COMPLETE, VALID, parametric OpenSCAD (.scad) file for a two-part enclosure (base + lid) with:
- Correct internal clearance around the board/components (min 1-2mm walls, standoffs with screw holes if a PCB is mentioned)
- Cutouts for any ports/connectors/buttons/LEDs mentioned, positioned sensibly
- Snap-fit or screw-boss lid attachment (your choice, note which)
- Reasonable wall thickness (2-3mm), fillets where easy
- Comments explaining key parameters at the top so a human can tweak dimensions

Respond with ONLY the OpenSCAD code. No markdown fences, no explanation before or after.`;

let lastScad = '', lastReadme = '', lastDescription = '';

// ---- Import: accept a MAKESPEC-style export (form_inputs/state.currentSpec) or plain {description} ----
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      const spec = data.state?.currentSpec || data.currentSpec || data;
      const fi = data.form_inputs || {};
      const parts = [];
      if (fi.idea || spec.project_title) parts.push(`Project: ${fi.idea || spec.project_title}`);
      if (fi.description || spec.summary) parts.push(`Description: ${fi.description || spec.summary}`);
      if (spec.parts?.length) {
        parts.push('Parts/components to house: ' + spec.parts.map(p =>
          `${p.name}${p.dimensions_mm ? ` (${p.dimensions_mm.w||'?'}x${p.dimensions_mm.h||'?'}x${p.dimensions_mm.d||'?'}mm)` : ''}`
        ).join(', '));
      }
      if (fi.features) parts.push(`Features/cutouts needed: ${fi.features}`);
      document.getElementById('description').value = parts.join('\n') || 'No description found in file.';
      document.getElementById('status').textContent = 'Imported project into description field.';
    } catch (err) {
      document.getElementById('status').textContent = 'Import failed: ' + err.message;
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ---- Generate ----
document.getElementById('genBtn').onclick = async () => {
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('model').value.trim() || 'anthropic/claude-sonnet-4.5';
  const description = document.getElementById('description').value.trim();
  const status = document.getElementById('status');
  const btn = document.getElementById('genBtn');
  if (!apiKey || !description) { status.textContent = 'API key and description required.'; return; }
  btn.disabled = true;
  status.textContent = 'Generating (20-60s)...';
  try {
    const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.href,
        'X-Title': 'AI Enclosure Generator'
      },
      body: JSON.stringify({
        model,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: description }
        ],
        temperature: 0.3
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error?.message || JSON.stringify(data));
    let scad = data.choices?.[0]?.message?.content || '';
    scad = scad.replace(/^```(?:scad|openscad)?\n?/i, '').replace(/```$/, '').trim();

    lastScad = scad;
    lastDescription = description;
    lastReadme = `# Enclosure\n\nGenerated from description:\n\n${description}\n\n## Files\n- enclosure.scad — parametric source, edit params at top\n\n## Export STL\nOpen enclosure.scad in the OpenSCAD app (openscad.org), press F6 to render, then export as STL.\n`;

    document.getElementById('result').style.display = 'block';
    document.getElementById('code').textContent = scad;
    document.getElementById('links').innerHTML =
      `<a class="btn" id="dlScad" href="#">Download .scad</a>` +
      `<a class="btn" id="dlZip" href="#">Download all files (.zip)</a>`;
    document.getElementById('dlScad').onclick = (e) => { e.preventDefault(); downloadBlob(scad, 'enclosure.scad'); };
    document.getElementById('dlZip').onclick = async (e) => { e.preventDefault(); await downloadZip(); };
    document.getElementById('exportBtn').disabled = false;
    status.textContent = 'Done.';
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
  } finally {
    btn.disabled = false;
  }
};

function downloadBlob(content, filename) {
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function downloadZip() {
  const zip = new JSZip();
  zip.file('enclosure.scad', lastScad);
  zip.file('README.md', lastReadme);
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'enclosure-project.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ---- Export project JSON (so it round-trips / can be re-imported later) ----
document.getElementById('exportBtn').onclick = () => {
  const pkg = {
    tool: 'ai-enclosure-generator',
    version: '1.0.0',
    description: lastDescription,
    scad: lastScad
  };
  downloadBlob(JSON.stringify(pkg, null, 2), 'enclosure_project.json');
};
</script>
</body>
</html>
